# =============================================================================
# Ruff設定ファイル
# 最も厳格かつ安全な設定 - 日本語コーディング対応版
# =============================================================================


# =============================================================================
# 基本設定
# =============================================================================

# Pythonのターゲットバージョン
# py313ではmatch文、Union型の|演算子、組み込み型の汎用化等が利用可能である
target-version = "py313"

# 1行あたりの最大文字数(Blackのデフォルトと同値)
line-length = 88

# インデント幅(PEP 8準拠の4スペース)
indent-width = 4

# プレビュー機能の有効化
# 最新のルールや機能を先行的に取り入れる
preview = true

# =============================================================================
# ファイル選択設定
# =============================================================================

# チェック対象ファイルパターン
include = ["*.py", "*.pyi", "**/pyproject.toml"]

# チェック対象から除外するディレクトリ
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "venv",
  ".vscode",
  ".idea",
]

# .gitignoreの内容を尊重する
respect-gitignore = true

# =============================================================================
# 出力設定
# =============================================================================

# 修正内容の表示を有効にする
show-fixes = true

# 詳細な診断情報を含む完全な出力形式を使用する
output-format = "full"


# =============================================================================
# フォーマット設定
# =============================================================================
[format]
# ダブルクォートを使用する
quote-style = "double"

# スペースインデントを使用する
indent-style = "space"

# マジックトレーリングカンマがある場合は改行を維持する(Black互換)
skip-magic-trailing-comma = false

# 改行コードはLF統一とする
line-ending = "lf"

# docstring内のコードブロックもフォーマットする
docstring-code-format = true

# docstring内コードの行長制限(通常より短めに設定)
docstring-code-line-length = 72

# =============================================================================
# リント設定
# =============================================================================
[lint]
# 全ルールを有効化し、不要なものだけをignoreで除外する方式
select = ["ALL"]

# 無視するルール
ignore = [
  # --- フォーマッタとの競合回避 ---
  # ruff formatが処理する領域と重複するルール群
  # 公式ドキュメントで「フォーマッタ使用時はignore推奨」と明記されている
  "D203",   # one-blank-line-before-class (D211と競合)
  "D213",   # multi-line-summary-second-line (D212と競合)
  "COM812", # trailing-comma-missing
  "ISC001", # single-line-implicit-string-concatenation
  "E111",   # indentation-with-invalid-multiple
  "E114",   # indentation-with-invalid-multiple-comment
  "E117",   # over-indented
  "W191",   # indentation-contains-tabs
  "W291",   # trailing-whitespace
  "W292",   # no-newline-at-end-of-file
  "W293",   # whitespace-before-comment

  # --- 日本語対応 ---
  # 日本語の全角文字(括弧、句読点等)がラテン文字と誤認される
  "RUF001", # ambiguous-unicode-character-string
  "RUF002", # ambiguous-unicode-character-docstring
  "RUF003", # ambiguous-unicode-character-comment
  # 日本語docstringでは末尾のピリオドや句点の強制が不自然である
  "D400",   # ends-in-period
  "D415",   # ends-in-punctuation

  # --- 開発ワークフロー ---
  # 開発段階で必要なコメントタグやprint文を許可する
  "T201",   # print (GitHub Actions等でのログ出力に必要)
  "ERA001", # commented-out-code (開発中に必要)
  "FIX001", # line-contains-fixme
  "FIX002", # line-contains-todo
  "FIX003", # line-contains-xxx
  "FIX004", # line-contains-hack
  "TD002",  # missing-todo-author (個人開発では過度)
  "TD003",  # missing-todo-link (個人開発では過度)

  # --- プロジェクト構造 ---
  "INP001", # implicit-namespace-package (スクリプト単体では__init__.py不要)
  "CPY001", # missing-copyright-notice (個人プロジェクトでは過剰)
  "EXE001", # shebang-not-executable (Windows環境では実行権限の概念が異なる)
  "EXE002", # shebang-missing-executable-file (同上)

  # --- スタイル選好 ---
  # Python 3.13ではPEP 604/585がネイティブ対応、isortで既にfuture annotations強制中
  "FA100",  # future-annotations-missing
  "FA102",  # future-annotations-in-older-syntax
  # 可読性や誤検知の観点から無効化する
  "SIM108", # if-else-block-instead-of-if-exp (複雑条件で可読性低下)
  "SIM300", # yoda-conditions (誤検知報告あり)
]

# 全ルールの自動修正を有効化する
fixable = ["ALL"]
unfixable = []

# ダミー変数パターン
# アンダースコア先頭やdummy/unusedという名前は未使用でも警告しない
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?)|dummy|unused)$"

# リントでもプレビュー機能を有効化する
preview = true

# プレビュールールを明示的に有効化する
explicit-preview-rules = true

# 型チェック用モジュール
typing-modules = ["typing", "typing_extensions"]

# コード内のタスクタグ(日本語タグも含む)
task-tags = [
  "TODO",
  "FIXME",
  "HACK",
  "BUG",
  "NOBUG",
  "REQ",
  "IDEA",
  "NOTE",
  "ISSUE",
  "XXX",
]

# =============================================================================
# 個別ルール設定
# =============================================================================

# --- flake8-annotations: 型アノテーション ---
[lint.flake8-annotations]
# *argsにAny型を許可しない
allow-star-arg-any = false
# 完全に型注釈のない関数も検査対象とする
ignore-fully-untyped = false
# ダミー引数にも型注釈を要求する
suppress-dummy-args = false
# None返却関数にも明示的な -> None を要求する
suppress-none-returning = false
# __init__にもNone返却型を要求する(mypy互換)
mypy-init-return = true

# --- flake8-bandit: セキュリティ ---
[lint.flake8-bandit]
# 型付き例外のチェックを有効化する
check-typed-exception = true

# --- flake8-comprehensions: 内包表記の最適化 ---
[lint.flake8-comprehensions]
# dict()にキーワード引数を許可しない(dict comprehensionを推奨)
allow-dict-calls-with-keyword-arguments = false

# --- flake8-errmsg: エラーメッセージ ---
[lint.flake8-errmsg]
# 30文字以下のエラーメッセージは直接記述を許可する
max-string-length = 30

# --- flake8-implicit-str-concat: 暗黙的文字列結合 ---
[lint.flake8-implicit-str-concat]
# 複数行にまたがる暗黙的文字列結合を許可する
allow-multiline = true

# --- flake8-import-conventions: インポート規約 ---
[lint.flake8-import-conventions]

[lint.flake8-import-conventions.aliases]
"numpy" = "np"
"pandas" = "pd"
"matplotlib.pyplot" = "plt"
"seaborn" = "sns"
"tensorflow" = "tf"

# --- flake8-pytest-style: pytestスタイル ---
[lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true
parametrize-names-type = "csv"
parametrize-values-type = "list"
parametrize-values-row-type = "tuple"

# --- flake8-quotes: クォートの一貫性 ---
[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"
# エスケープ回避のためにクォートスタイルの変更を許可する
avoid-escape = true

# --- flake8-tidy-imports: インポートの整理 ---
[lint.flake8-tidy-imports]
# 全ての相対インポートを禁止する
ban-relative-imports = "all"

# --- flake8-type-checking: 型チェック専用インポート ---
[lint.flake8-type-checking]
# 厳密モード: 実行時に不要な型チェック専用インポートを検出する
strict = true

# 常に通常のインポートとして扱うモジュール
exempt-modules = ["typing", "typing_extensions"]

# 実行時に評価される基底クラス(通常のインポートが必要)
runtime-evaluated-base-classes = [
  "pydantic.BaseModel",
  "sqlalchemy.orm.DeclarativeBase",
]

# 実行時に評価されるデコレータ
runtime-evaluated-decorators = [
  "attrs.define",
  "attrs.frozen",
  "dataclasses.dataclass",
]

# アノテーションをクォートで囲む(PEP 563互換)
quote-annotations = true

# --- flake8-unused-arguments: 未使用引数 ---
[lint.flake8-unused-arguments]
# *args, **kwargsも未使用チェックの対象とする
ignore-variadic-names = false

# --- isort: インポート文の整理 ---
[lint.isort]
force-single-line = false
# エイリアスインポートを強制的に改行する
force-wrap-aliases = true
# as付き複数インポートを結合する
combine-as-imports = true
# 末尾カンマで改行を分割する
split-on-trailing-comma = true
# 全ファイルでfuture annotationsを強制する
# py313でも遅延評価による循環参照解決やpydantic互換性のため維持する
required-imports = ["from __future__ import annotations"]
# プロジェクト固有のモジュール(プロジェクトに応じて設定)
known-first-party = []
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]

# --- mccabe: 循環的複雑度 ---
[lint.mccabe]
# 複雑度10を超える関数は理解困難になる傾向がある
max-complexity = 10

# --- pep8-naming: 命名規則 ---
# ignore-namesはデフォルト値を使用する(setUp, tearDown等のunittest関連名を含む)
# 空リストで上書きするとこれらの名前が警告対象になるため、設定を省略する
[lint.pep8-naming]

# クラスメソッドと見なすデコレータ
classmethod-decorators = [
  "classmethod",
  "pydantic.field_validator",
]

# 静的メソッドと見なすデコレータ
staticmethod-decorators = ["staticmethod"]

# --- pycodestyle: コードスタイル ---
[lint.pycodestyle]
# docstringの最大行長
max-doc-length = 88
# タスクコメントも行長制限の対象とする
ignore-overlong-task-comments = false

# --- pydocstyle: docstringスタイル ---
[lint.pydocstyle]
# convention設定によりD203, D204, D213等が自動的に無効化される
convention = "google"

# プロパティと見なすデコレータ
property-decorators = [
  "property",
  "cached_property",
  "functools.cached_property",
]

# --- pylint: 品質チェック ---
[lint.pylint]
# マジック値として許可する型
allow-magic-value-types = ["int", "str", "float"]
# 関数の最大引数数
max-args = 5
# ブール式の最大項数
max-bool-expr = 3
# 最大分岐数(if/elif)
max-branches = 10
# 最大ローカル変数数
max-locals = 10
# 最大ネストブロック数
max-nested-blocks = 3
# 最大位置引数数(キーワード引数の使用を促進する)
max-positional-args = 3
# クラスの最大パブリックメソッド数
max-public-methods = 20
# 関数の最大return文数
max-returns = 5
# 関数の最大文数
max-statements = 35

# --- pyupgrade: 最新Python構文への更新 ---
[lint.pyupgrade]
# Python 3.13ではPEP 604/585がネイティブ対応のため、この設定はno-opである
# 下位バージョンをターゲットにする場合は有効化すること
# keep-runtime-typing = true

# =============================================================================
# ファイル別の除外設定
# =============================================================================
[lint.per-file-ignores]

# テストファイル
"tests/**/*.py" = [
  "S101",    # assert文の使用(テストでは必須)
  "S105",    # ハードコードされたパスワード(テストデータ)
  "S106",    # 引数にハードコードされたパスワード(テストデータ)
  "ARG",     # 未使用引数(pytest fixtureで発生)
  "FBT",     # ブール引数(テストパラメータで頻出)
  "PLR2004", # マジックナンバー(テストの期待値)
  "S311",    # 擬似乱数(テスト用途では問題なし)
  "ANN",     # 型注釈(テストでは優先度低)
  "D",       # docstring(テストコードでは任意)
  "PLR0913", # 引数が多い(複雑なテストケース)
  "SLF001",  # プライベートメンバーアクセス(内部テスト)
]

# データベースマイグレーション(自動生成ファイル)
"**/migrations/**/*.py" = [
  "ALL",
]

# 設定ファイル
"conf.py" = [
  "D100", # モジュールレベルdocstring不要
]

"setup.py" = [
  "D",   # docstring不要
  "ANN", # 型注釈不要
]

"docs/conf.py" = [
  "D100", # モジュールレベルdocstring不要
  "A001", # 組み込み名の上書き(Sphinx設定で一般的)
]

# CLIスクリプト
"scripts/**/*.py" = [
  "S603", # shell=Trueでのsubprocess呼び出し
  "S607", # 実行可能パス(gh, git, uv等の実行で必要)
]

# 型スタブファイル
"**/*.pyi" = [
  "PYI025", # docstringとの競合回避
]
