colors: false
no_tty: true

pre-commit:
  parallel: true
  jobs:
    - name: ignored-files
      run: "! git check-ignore {staged_files}"

    - name: lefthook
      glob: lefthook.yml
      run: uvx lefthook validate

    - name: gitleaks
      run: bunx gitleaks protect --staged

    - name: shell
      glob: '*.{sh,bash}'
      run: |
        bunx shfmt -w {staged_files}
        bunx shellcheck {staged_files}
      stage_fixed: true

    - name: yaml
      glob: '*.{yaml,yml}'
      exclude: 'lefthook.yml'
      run: |
        uvx yamlfix {staged_files}
        uvx yamllint {staged_files}
      stage_fixed: true

    - name: biome
      run: >
        bunx @biomejs/biome check --write --no-errors-on-unmatched
        --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: ruff
      glob: '*.{py,pyi}'
      run: |
        uvx ruff format {staged_files}
        uvx ruff check --fix {staged_files}
      stage_fixed: true

    - name: pyright
      glob: '*.{py,pyi}'
      run: uvx pyright {staged_files}

    - name: pytest
      glob: '**/*.py'
      run: |
        t=$(for f in {staged_files}; do b=$(basename "$f")
          [[ "$b" != test_* ]] && b="test_$b"
          [ -f "tests/$b" ] && echo "tests/$b"
        done | sort -u)
        ${t:+uv run pytest -q $t}
